services:
  dev-db:
    image: postgres:15
    container_name: job_board_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: job_board
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: job_board_backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:123@dev-db:5432/job_board?schema=public"
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - dev-db

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: job_board_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
      API_BASE_URL: http://backend:5000
    depends_on:
      - backend

volumes:
  pgdata:
